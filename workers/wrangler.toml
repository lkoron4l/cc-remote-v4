name = "cc-remote-dispatcher"
main = "src/index.js"
compatibility_date = "2025-04-01"
account_id = "96a3283c25361ff85dc0414a41ff5aab"

[[durable_objects.bindings]]
name = "PC_REGISTRY"
class_name = "PCRegistry"

[[durable_objects.bindings]]
name = "SESSION_STORE"
class_name = "SessionStore"

[[durable_objects.bindings]]
name = "INVITE_STORE"
class_name = "InviteStore"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PCRegistry"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["SessionStore"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["InviteStore"]

# ──── staging（継続、名前変更なし）────
[env.staging]
name = "cc-remote-dispatcher-staging"
workers_dev = true

# [env.staging.vars] moved to secrets (see .dev.vars.example)
# Set via: wrangler secret put OAUTH_REDIRECT_URI --env staging
# Set via: wrangler secret put ALLOWED_ORIGINS --env staging

[env.staging.assets]
directory = "../dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[[env.staging.durable_objects.bindings]]
name = "PC_REGISTRY"
class_name = "PCRegistry"

[[env.staging.durable_objects.bindings]]
name = "SESSION_STORE"
class_name = "SessionStore"

[[env.staging.durable_objects.bindings]]
name = "INVITE_STORE"
class_name = "InviteStore"

[[env.staging.migrations]]
tag = "v1"
new_sqlite_classes = ["PCRegistry"]

[[env.staging.migrations]]
tag = "v2"
new_sqlite_classes = ["SessionStore"]

[[env.staging.migrations]]
tag = "v3"
new_sqlite_classes = ["InviteStore"]

# ──── production（cc-remote へリネーム）────
[env.production]
name = "cc-remote"
workers_dev = true

# [env.production.vars] moved to secrets (see .dev.vars.example)
# Set via: wrangler secret put OAUTH_REDIRECT_URI --env production
# Set via: wrangler secret put ALLOWED_ORIGINS --env production

# Android TWA: Digital Asset Links の公開SHA256フィンガープリント。
# 1つ目 = Upload Key（cc-remote.keystore 2026-04-13 作成、CN=CC Remote）
# 2つ目 = Play App Signing 管理鍵（初回AABアップロード後にPlay Consoleで確認し追記する）
[env.production.vars]
ANDROID_UPLOAD_SHA256 = "A5:3D:13:EB:64:87:86:D0:82:B9:8D:87:25:74:F5:2B:79:C8:FA:17:9C:DD:17:EA:C5:81:50:BA:59:6C:80:A2"
ANDROID_PLAY_SHA256 = ""

[env.production.assets]
directory = "../dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[[env.production.durable_objects.bindings]]
name = "PC_REGISTRY"
class_name = "PCRegistry"

[[env.production.durable_objects.bindings]]
name = "SESSION_STORE"
class_name = "SessionStore"

[[env.production.durable_objects.bindings]]
name = "INVITE_STORE"
class_name = "InviteStore"

[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["PCRegistry"]

[[env.production.migrations]]
tag = "v2"
new_sqlite_classes = ["SessionStore"]

[[env.production.migrations]]
tag = "v3"
new_sqlite_classes = ["InviteStore"]
